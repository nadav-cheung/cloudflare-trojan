services:
  sni-proxy:
    image: gogost/gost:latest
    command: -L "sni://:18443"
    ports:
      - "18443:18443"
    restart: always
    networks:
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "gost", "-V"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy:
    driver: bridge
